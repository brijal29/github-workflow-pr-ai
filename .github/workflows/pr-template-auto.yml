name: Auto-fill PR template sections

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, closed]
  push:
    branches: ['**']

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-template-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm ci

      - name: Run PR Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # OpenAI (LLM summaries)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-3.5-turbo
          OPENAI_TEMPERATURE: "0.15"

          # Jira Sync (IMPORTANT: base URL only, no /browse)
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}     # e.g. https://yourorg.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

          # Jira behavior toggles
          JIRA_ENABLE_COMMENTS: "true"
          JIRA_ENABLE_TRANSITIONS: "true"

          # Transition names (change if your Jira workflow uses different names)
          JIRA_TRANSITION_IN_PROGRESS_NAME: "Code Review"
          JIRA_TRANSITION_DONE_NAME: "Done"

          # Limits / safety
          MAX_FILES: "8"
          MAX_PATCH_CHARS: "2000"
          DRY_RUN: "false"
        run: node ./scripts/update-pr-final.js