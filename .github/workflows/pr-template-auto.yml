name: Auto-fill PR template sections

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: ['**']

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-template-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm ci

      - name: Run PR Agent
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}     # required for LLM summaries
          OPENAI_MODEL: gpt-3.5-turbo
          JIRA_BASE_URL: https://ascensionjira.atlassian.net/browse
          MAX_FILES: "8"
          MAX_PATCH_CHARS: "2000"
          DRY_RUN: "false"   # set to false after validating output
        run: node ./scripts/update-pr-final.js